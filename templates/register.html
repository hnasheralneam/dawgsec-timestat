{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-14 neu-surface p-6">
  <h1 class="text-2xl font-semibold mb-2 text-gb-fg">Create account</h1>
  <p class="text-sm mb-6 text-gb-fg/75">You will receive a 6-digit login code after signup.</p>
  <form method="post" class="space-y-4">
    <label class="block">
      <span class="text-sm text-gb-fg/85">Username</span>
      <input name="username" required class="mt-1 neu-input">
    </label>
    <button class="w-full neu-btn bg-gb-green text-gb-bg0 border-gb-green/80">Create account</button>
  </form>
  <p class="mt-5 text-sm text-gb-fg/75">
    Already have an account?
    <a class="font-medium text-gb-purple hover:text-gb-blue" href="{{ url_for('login') }}">Sign in</a>
  </p>
</div>
{% endblock %}
