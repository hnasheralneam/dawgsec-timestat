{% extends "base.html" %}
{% block content %}
<div class="min-h-[calc(100vh-5.5rem)] flex items-center justify-center">
  <div class="w-full max-w-md neu-surface p-6 sm:p-7">
    <div class="mb-6">
      <div class="inline-flex items-center gap-2 text-xs uppercase tracking-wide text-gb-fg/70 mb-2">
        <span class="material-symbols-rounded" aria-hidden="true">schedule</span>
        TimeStat
      </div>
      <h1 class="text-2xl font-semibold text-gb-fg flex items-center gap-2">
        <span class="material-symbols-rounded" aria-hidden="true">person_add</span>
        Create account
      </h1>
      <p class="text-sm mt-2 text-gb-fg/75">You will receive a 6-digit login code after signup.</p>
    </div>

    <form method="post" class="space-y-4">
      <label class="block">
        <span class="text-sm text-gb-fg/85">Username</span>
        <input name="username" required autocomplete="username" class="mt-1 neu-input">
      </label>
      <button class="w-full neu-btn bg-gb-green text-gb-bg0 border-gb-green/80 inline-flex items-center justify-center gap-2">
        <span class="material-symbols-rounded" aria-hidden="true">how_to_reg</span>
        Create account
      </button>
    </form>

    <p class="mt-5 text-sm text-gb-fg/75 text-center">
      Already have an account?
      <a class="font-medium text-gb-purple hover:text-gb-blue inline-flex items-center gap-1" href="{{ url_for('login') }}">
        <span class="material-symbols-rounded" aria-hidden="true">login</span>
        Sign in
      </a>
    </p>
  </div>
</div>
{% endblock %}
{% block footer %}{% endblock %}
