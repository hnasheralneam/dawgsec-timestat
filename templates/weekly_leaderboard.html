{% extends "base.html" %}
{% block content %}
<header class="flex flex-wrap items-center justify-between gap-3 mb-6">
  <div>
    <h1 class="text-2xl font-semibold text-gb-fg flex items-center gap-2">
      <span class="material-symbols-rounded" aria-hidden="true">leaderboard</span>
      Weekly Leaderboard
    </h1>
    <p class="text-sm text-gb-fg/75">Top tracked time for the last 7 days.</p>
  </div>
  <div class="flex items-center gap-2">
    <a href="{{ url_for('dashboard') }}" class="neu-btn text-sm bg-gb-blue text-gb-bg0 border-gb-blue/80 inline-flex items-center gap-2">
      <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
      Back to dashboard
    </a>
    <button class="theme-toggle neu-btn text-gb-fg border-gb-bg2 bg-gb-bg1 p-2 inline-flex items-center justify-center" title="Switch to dark mode" aria-label="Switch to dark mode" type="button">
      <span class="material-symbols-rounded" aria-hidden="true">dark_mode</span>
    </button>
    <form action="{{ url_for('logout') }}" method="post">
      <button class="neu-btn text-sm bg-gb-red text-gb-bg0 border-gb-red/80 inline-flex items-center gap-2">
        <span class="material-symbols-rounded" aria-hidden="true">logout</span>
        Sign out
      </button>
    </form>
  </div>
</header>

<section class="neu-surface p-4">
  <h2 class="font-semibold text-lg mb-3 text-gb-fg flex items-center gap-2">
    <span class="material-symbols-rounded" aria-hidden="true">calendar_month</span>
    Full Weekly Rankings
  </h2>
  <div class="overflow-auto">
    <table class="w-full text-sm">
      <thead class="text-gb-fg/70">
        <tr>
          <th class="text-left py-2">Rank</th>
          <th class="text-left py-2">User</th>
          <th class="text-right py-2">Hours</th>
        </tr>
      </thead>
      <tbody id="weeklyLeaderboardBody"></tbody>
    </table>
  </div>
</section>

<script>
  function formatHours(seconds) {
    return (seconds / 3600).toFixed(2);
  }

  async function loadWeeklyLeaderboard() {
    const res = await fetch("/api/leaderboard/weekly");
    const data = await res.json();
    const tbody = document.getElementById("weeklyLeaderboardBody");
    tbody.innerHTML = "";
    for (const row of data.leaderboard) {
      const tr = document.createElement("tr");
      tr.className = "border-t border-gb-bg2";
      tr.innerHTML = `
        <td class="py-2">${row.rank}</td>
        <td class="py-2">
          <a href="/users/${row.user_id}" class="inline-flex items-center gap-1 font-medium text-gb-blue hover:text-gb-purple">
            <span class="material-symbols-rounded" aria-hidden="true">person</span>
            ${row.username}
          </a>
        </td>
        <td class="py-2 text-right">${formatHours(row.seconds)}</td>
      `;
      tbody.appendChild(tr);
    }
  }

  loadWeeklyLeaderboard();
</script>
{% endblock %}
