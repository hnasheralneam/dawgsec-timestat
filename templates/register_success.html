{% extends "base.html" %}
{% block content %}
<div class="min-h-[calc(100vh-5.5rem)] flex items-center justify-center">
  <div class="w-full max-w-md neu-surface p-6 sm:p-7">
    <div class="mb-5">
      <div class="inline-flex items-center gap-2 text-xs uppercase tracking-wide text-gb-fg/70 mb-2">
        <span class="material-symbols-rounded" aria-hidden="true">schedule</span>
        TimeStat
      </div>
      <h1 class="text-2xl font-semibold text-gb-fg flex items-center gap-2">
        <span class="material-symbols-rounded" aria-hidden="true">verified</span>
        Account ready
      </h1>
      <p class="text-sm mt-2 text-gb-fg/80">Save this code now. You will use it to sign in as <span class="font-semibold">{{ username }}</span>.</p>
    </div>

    <div class="neu-inset p-4 text-center">
      <div class="text-xs tracking-wide uppercase text-gb-fg/70 mb-1 inline-flex items-center gap-1">
        <span class="material-symbols-rounded" aria-hidden="true">pin</span>
        Your 6-digit code
      </div>
      <div class="text-4xl tracking-widest font-bold text-gb-green">{{ six_digit_code }}</div>
    </div>

    <a href="{{ url_for('login') }}" class="mt-5 w-full text-center neu-btn bg-gb-blue text-gb-bg0 border-gb-blue/80 inline-flex items-center justify-center gap-2">
      <span class="material-symbols-rounded" aria-hidden="true">login</span>
      Go to sign in
    </a>
  </div>
</div>
{% endblock %}
