<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{{ title or "TimeStat" }}</title>
  <script>
    (function () {
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      let savedTheme = null;
      try {
        savedTheme = localStorage.getItem("timestat-theme");
      } catch (_err) {}
      const useDark = savedTheme ? savedTheme === "dark" : prefersDark;
      if (useDark) document.documentElement.classList.add("dark");
    })();

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            gb: {
              bg0: "rgb(var(--gb-bg0-rgb) / <alpha-value>)",
              bg1: "rgb(var(--gb-bg1-rgb) / <alpha-value>)",
              bg2: "rgb(var(--gb-bg2-rgb) / <alpha-value>)",
              fg: "rgb(var(--gb-fg-rgb) / <alpha-value>)",
              red: "rgb(var(--gb-red-rgb) / <alpha-value>)",
              green: "rgb(var(--gb-green-rgb) / <alpha-value>)",
              yellow: "rgb(var(--gb-yellow-rgb) / <alpha-value>)",
              aqua: "rgb(var(--gb-aqua-rgb) / <alpha-value>)",
              blue: "rgb(var(--gb-blue-rgb) / <alpha-value>)",
              purple: "rgb(var(--gb-purple-rgb) / <alpha-value>)",
            },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@0..1">
  <style>
    :root {
      --gb-bg0-rgb: 249 245 215;
      --gb-bg1-rgb: 235 219 178;
      --gb-bg2-rgb: 213 196 161;
      --gb-fg-rgb: 60 56 54;
      --gb-red-rgb: 204 36 29;
      --gb-green-rgb: 152 151 26;
      --gb-yellow-rgb: 215 153 33;
      --gb-aqua-rgb: 104 157 106;
      --gb-blue-rgb: 69 133 136;
      --gb-purple-rgb: 177 98 134;
      --gb-shadow-rgb: 208 192 159;
      --gb-highlight-rgb: 255 249 223;
    }

    .dark {
      --gb-bg0-rgb: 40 40 40;
      --gb-bg1-rgb: 60 56 54;
      --gb-bg2-rgb: 80 73 69;
      --gb-fg-rgb: 235 219 178;
      --gb-shadow-rgb: 45 42 40;
      --gb-highlight-rgb: 78 72 68;
    }

    body {
      background: radial-gradient(
        circle at top left,
        rgb(var(--gb-bg1-rgb)) 0%,
        rgb(var(--gb-bg0-rgb)) 42%,
        rgb(var(--gb-bg1-rgb)) 100%
      );
      color: rgb(var(--gb-fg-rgb));
    }

    .neu-surface {
      background: rgb(var(--gb-bg0-rgb));
      border: 1px solid rgb(var(--gb-bg2-rgb));
      border-radius: 1.1rem;
      box-shadow: 8px 8px 18px rgb(var(--gb-shadow-rgb)), -8px -8px 18px rgb(var(--gb-highlight-rgb));
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .neu-surface:hover {
      box-shadow: 10px 10px 20px rgb(var(--gb-shadow-rgb)), -10px -10px 20px rgb(var(--gb-highlight-rgb));
    }

    .neu-inset {
      background: rgb(var(--gb-bg1-rgb));
      border: 1px solid rgb(var(--gb-bg2-rgb));
      box-shadow: inset 6px 6px 12px rgb(var(--gb-shadow-rgb)), inset -6px -6px 12px rgb(var(--gb-highlight-rgb));
      border-radius: 0.9rem;
    }

    .neu-input {
      width: 100%;
      background: rgb(var(--gb-bg1-rgb));
      border: 1px solid rgb(var(--gb-bg2-rgb));
      border-radius: 0.8rem;
      padding: 0.6rem 0.85rem;
      color: rgb(var(--gb-fg-rgb));
      box-shadow: inset 4px 4px 10px rgb(var(--gb-shadow-rgb)), inset -4px -4px 10px rgb(var(--gb-highlight-rgb));
    }

    .neu-input:focus {
      outline: none;
      border-color: rgb(var(--gb-blue-rgb));
      box-shadow: inset 4px 4px 10px rgb(var(--gb-shadow-rgb)), inset -4px -4px 10px rgb(var(--gb-highlight-rgb)), 0 0 0 2px rgb(var(--gb-blue-rgb) / 0.25);
    }

    .neu-btn {
      border-radius: 0.85rem;
      padding: 0.55rem 1rem;
      font-weight: 600;
      border: 1px solid transparent;
      box-shadow: 6px 6px 12px rgb(var(--gb-shadow-rgb)), -6px -6px 12px rgb(var(--gb-highlight-rgb));
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    .neu-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .neu-btn:active {
      transform: translateY(0);
      box-shadow: inset 4px 4px 8px rgb(var(--gb-shadow-rgb)), inset -4px -4px 8px rgb(var(--gb-highlight-rgb));
    }

    .empty-state {
      border: 1px dashed rgb(var(--gb-bg2-rgb));
      border-radius: 0.9rem;
      padding: 0.85rem;
      text-align: center;
      color: rgb(var(--gb-fg-rgb) / 0.75);
      background: rgb(var(--gb-bg1-rgb) / 0.45);
    }

    .hint {
      cursor: help;
      border-bottom: 1px dotted rgb(var(--gb-blue-rgb) / 0.7);
    }

    @media (max-width: 768px) {
      .responsive-table thead {
        display: none;
      }

      .responsive-table,
      .responsive-table tbody,
      .responsive-table tr,
      .responsive-table td {
        display: block;
        width: 100%;
      }

      .responsive-table tr {
        border-top: 1px solid rgb(var(--gb-bg2-rgb));
        padding: 0.45rem 0;
      }

      .responsive-table td {
        border: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        padding: 0.35rem 0;
        text-align: right;
      }

      .responsive-table td::before {
        content: attr(data-label);
        font-weight: 600;
        color: rgb(var(--gb-fg-rgb) / 0.8);
        text-align: left;
        flex: 1 1 auto;
      }
    }

    .material-symbols-rounded {
      font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 24;
      font-size: 1.1rem;
      line-height: 1;
      vertical-align: middle;
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-6">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="space-y-2 mb-4">
          {% for category, message in messages %}
            <div class="neu-surface px-3 py-2 text-sm flex items-center gap-2 {{ 'text-gb-red border-gb-red/50' if category == 'error' else 'text-gb-green border-gb-green/40' }}">
              <span class="material-symbols-rounded" aria-hidden="true">{{ 'error' if category == 'error' else 'check_circle' }}</span>
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <script>
    (function () {
      window.getCsrfToken = function () {
        const meta = document.querySelector('meta[name="csrf-token"]');
        return meta ? meta.getAttribute("content") || "" : "";
      };

      document.querySelectorAll('form[method="post"], form[method="POST"]').forEach((form) => {
        if (form.querySelector('input[name="csrf_token"]')) return;
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "csrf_token";
        input.value = window.getCsrfToken();
        form.appendChild(input);
      });

      const applyThemeUi = () => {
        const isDark = document.documentElement.classList.contains("dark");
        document.querySelectorAll(".theme-toggle").forEach((toggleBtn) => {
          const icon = toggleBtn.querySelector(".material-symbols-rounded");
          if (!icon) return;
          icon.textContent = isDark ? "light_mode" : "dark_mode";
          const titleText = isDark ? "Switch to light mode" : "Switch to dark mode";
          toggleBtn.title = titleText;
          toggleBtn.setAttribute("aria-label", titleText);
        });
      };

      applyThemeUi();
      document.querySelectorAll(".theme-toggle").forEach((toggleBtn) => {
        toggleBtn.addEventListener("click", () => {
          const nowDark = document.documentElement.classList.toggle("dark");
          try {
            localStorage.setItem("timestat-theme", nowDark ? "dark" : "light");
          } catch (_err) {}
          applyThemeUi();
        });
      });
    })();
  </script>
</body>
</html>
