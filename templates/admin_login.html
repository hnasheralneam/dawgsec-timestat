{% extends "base.html" %}
{% block content %}
<div class="min-h-[calc(100vh-5.5rem)] flex items-center justify-center">
  <div class="w-full max-w-md neu-surface p-6 sm:p-7">
    <div class="mb-6">
      <div class="inline-flex items-center gap-2 text-xs uppercase tracking-wide text-gb-fg/70 mb-2">
        <span class="material-symbols-rounded" aria-hidden="true">admin_panel_settings</span>
        TimeStat Admin
      </div>
      <h1 class="text-2xl font-semibold text-gb-fg flex items-center gap-2">
        <span class="material-symbols-rounded" aria-hidden="true">shield_person</span>
        Admin sign in
      </h1>
      <p class="text-sm mt-2 text-gb-fg/75">Manage users and remove their tasks.</p>
    </div>

    <form method="post" class="space-y-4">
      <label class="block">
        <span class="text-sm text-gb-fg/85">Admin username</span>
        <input name="username" required autocomplete="username" class="mt-1 neu-input">
      </label>
      <label class="block">
        <span class="text-sm text-gb-fg/85">Admin password</span>
        <input name="password" type="password" required autocomplete="current-password" class="mt-1 neu-input">
      </label>
      <button class="w-full neu-btn bg-gb-blue text-gb-bg0 border-gb-blue/80 inline-flex items-center justify-center gap-2">
        <span class="material-symbols-rounded" aria-hidden="true">login</span>
        Sign in as admin
      </button>
    </form>

    <p class="mt-5 text-sm text-gb-fg/75 text-center">
      <a class="font-medium text-gb-purple hover:text-gb-blue inline-flex items-center gap-1" href="{{ url_for('login') }}">
        <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
        Back to user login
      </a>
    </p>
  </div>
</div>
{% endblock %}
